<!DOCTYPE html>
<html lang="ja" data-theme="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="アプリ一覧">
<meta name="theme-color" content="#1b4332">
<title>マイアプリ一覧</title>
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22%E3%83%9E%E3%82%A4%E3%82%A2%E3%83%97%E3%83%AA%E4%B8%80%E8%A6%A7%22%2C%22short_name%22%3A%22%E3%82%A2%E3%83%97%E3%83%AA%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f4efe6%22%2C%22theme_color%22%3A%22%231b4332%22%7D">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%231b4332'/%3E%3Ctext x='90' y='128' font-size='96' text-anchor='middle'%3E%F0%9F%93%B1%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#f4efe6; --bg2:#ece4d6; --card:#fffdf9; --ink:#2a2620; --sub:#8a8172;
    --line:#e4dccb; --green:#1b4332; --green2:#40916c; --accent:#c1583b; --gold:#c99a2e;
    --shadow:0 6px 22px rgba(60,50,30,.10);
    --serif:"Times New Roman",'Hiragino Mincho ProN','Yu Mincho',serif;
    --sans:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic',sans-serif;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#1c1a17; --bg2:#232019; --card:#2a2620; --ink:#ece4d6; --sub:#b3a892;
      --line:#3a352c; --shadow:0 6px 22px rgba(0,0,0,.35);
    }
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:var(--sans); color:var(--ink);
    background:linear-gradient(160deg,var(--bg),var(--bg2));
    min-height:100vh; padding:calc(env(safe-area-inset-top) + 28px) 20px 60px;
    -webkit-font-smoothing:antialiased;
  }
  header{max-width:640px; margin:0 auto 28px; text-align:center}
  header .emoji{font-size:52px; line-height:1}
  header h1{
    font-family:var(--serif); font-size:30px; font-weight:700; letter-spacing:.04em;
    color:var(--green); margin-top:8px;
  }
  @media (prefers-color-scheme: dark){ header h1{color:var(--green2)} }
  header p{color:var(--sub); font-size:14px; margin-top:6px}

  .grid{
    max-width:640px; margin:0 auto;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:16px;
  }
  a.app{
    display:flex; flex-direction:column; gap:10px;
    background:var(--card); border:1px solid var(--line); border-radius:20px;
    padding:22px 18px; text-decoration:none; color:inherit; box-shadow:var(--shadow);
    transition:transform .12s ease;
    min-height:132px;
  }
  a.app:active{transform:scale(.97)}
  a.app .ico{
    width:56px; height:56px; border-radius:16px; display:grid; place-items:center;
    font-size:30px; background:var(--bg2);
  }
  a.app .name{font-family:var(--serif); font-size:18px; font-weight:700; color:var(--green)}
  @media (prefers-color-scheme: dark){ a.app .name{color:var(--green2)} }
  a.app .desc{font-size:12.5px; color:var(--sub); line-height:1.5}

  footer{
    max-width:640px; margin:36px auto 0; text-align:center;
    color:var(--sub); font-size:12px;
  }
</style>
</head>
<body>
  <header>
    <div class="emoji">📱</div>
    <h1>マイアプリ一覧</h1>
    <p>作ったアプリをここから開けます</p>
  </header>

  <!-- アプリを追加するときは、この <a class="app"> ブロックをコピーしてください -->
  <nav class="grid">
    <a class="app" href="apps/odekake/">
      <div class="ico">🧳</div>
      <div class="name">おでかけ</div>
      <div class="desc">家族のおでかけ・旅行のしおり</div>
    </a>
  </nav>

  <footer>作ったアプリはこの一覧に自動で並びます</footer>
</body>
</html>
