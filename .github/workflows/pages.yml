name: Deploy to GitHub Pages

# main ブランチにプッシュされたらリポジトリ全体を GitHub Pages に公開します。
# 事前に GitHub の Settings > Pages で「Source: GitHub Actions」を選んでください。
# ※ Private リポジトリでの Pages 公開は有料プランが必要な場合があります。

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 公開の同時実行は1つに絞る（後発を優先）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
