# GitHub Pages 配信：03_implementation/ フォルダをサイトとして公開する。
# branchソースは root か /docs しか選べないため、numberedフォルダ配信には Actions を使う。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]        # main にマージされたら公開
  workflow_dispatch:        # 手動実行も可（Actionsタブから）

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 03_implementation   # ← このフォルダの中身がサイトのルートになる
      - id: deployment
        uses: actions/deploy-pages@v4
